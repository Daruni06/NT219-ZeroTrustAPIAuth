services:
  vault:
    image: hashicorp/vault:1.17
    command: server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"
    networks:
      - zerotrust

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./identity/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    networks:
      - zerotrust

  opa:
    image: openpolicyagent/opa:1.4.2
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --set=decision_logs.console=true
      - /policies/policy.rego
    ports:
      - "127.0.0.1:8181:8181"
    volumes:
      - ./policy/policy.rego:/policies/policy.rego:ro
    networks:
      - zerotrust

  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zerotrust

  authz:
    build:
      context: .
      dockerfile: authz/Dockerfile
    environment:
      AUTHZ_CONFIG_PATH: /app/authz/config.yaml
      KEYCLOAK_ISSUER: http://127.0.0.1:8080/realms/zero-trust
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/zero-trust/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: demo-client
      OPA_DECISION_URL: http://opa:8181/v1/data/zerotrust/authz/allow
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8090:8090"
    depends_on:
      - keycloak
      - opa
      - redis
    networks:
      - zerotrust

  user-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_DIR: backend/user_service
        APP_MODULE: backend.user_service.main
    command:
      - sh
      - -c
      - >
        uvicorn backend.user_service.main:app --host 0.0.0.0 --port 8000
        --ssl-certfile /certs/user-service.crt
        --ssl-keyfile /certs/user-service.key
        --ssl-ca-certs /certs/ca.crt
        --ssl-cert-reqs 2
    volumes:
      - ./pki/certs:/certs:ro
    networks:
      - zerotrust

  resource-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_DIR: backend/resource_service
        APP_MODULE: backend.resource_service.main
    command:
      - sh
      - -c
      - >
        uvicorn backend.resource_service.main:app --host 0.0.0.0 --port 8000
        --ssl-certfile /certs/resource-service.crt
        --ssl-keyfile /certs/resource-service.key
        --ssl-ca-certs /certs/ca.crt
        --ssl-cert-reqs 2
    volumes:
      - ./pki/certs:/certs:ro
    networks:
      - zerotrust

  admin-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_DIR: backend/admin_service
        APP_MODULE: backend.admin_service.main
    command:
      - sh
      - -c
      - >
        uvicorn backend.admin_service.main:app --host 0.0.0.0 --port 8000
        --ssl-certfile /certs/admin-service.crt
        --ssl-keyfile /certs/admin-service.key
        --ssl-ca-certs /certs/ca.crt
        --ssl-cert-reqs 2
    volumes:
      - ./pki/certs:/certs:ro
    networks:
      - zerotrust

  envoy:
    image: envoyproxy/envoy:v1.32-latest
    command:
      - envoy
      - -c
      - /etc/envoy/envoy.yaml
      - --service-cluster
      - zero-trust-gateway
    ports:
      - "127.0.0.1:10000:10000"
      - "127.0.0.1:9901:9901"
    volumes:
      - ./gateway/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./pki/certs:/etc/envoy/certs:ro
    depends_on:
      - authz
      - user-service
      - resource-service
      - admin-service
    networks:
      - zerotrust

networks:
  zerotrust:

volumes:
  keycloak_data:
  redis_data:
