# Keycloak server configuration for local/dev.
# Production/VPS values should be injected by environment variables.

http-enabled=true
http-port=8080
https-port=8443

hostname=localhost
hostname-strict=false
hostname-strict-https=false

health-enabled=true
metrics-enabled=true

# Dev mode can use the embedded database. For VPS/demo integration,
# switch to PostgreSQL/MySQL and load credentials from environment variables.
db=dev-file

# Realm import is usually passed when starting Keycloak:
# kc.sh start-dev --import-realm
